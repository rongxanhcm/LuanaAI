<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Monochrome version for logos -->
  <defs>
    <style>
      @keyframes shimmer {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .shimmer-spark { animation: shimmer 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Document -->
  <path d="M 50 35 L 50 165 Q 50 175 60 175 L 145 175 Q 155 175 155 165 L 155 35 Q 155 25 145 25 L 60 25 Q 50 25 50 35 Z" 
        fill="none" stroke="#EDE9E2" stroke-width="2.5"/>
  
  <!-- Fold corner -->
  <path d="M 145 25 L 145 50 Q 145 55 150 55 L 155 55" 
        fill="none" stroke="#EDE9E2" stroke-width="2.5"/>
  
  <!-- Text lines -->
  <line x1="65" y1="50" x2="135" y2="50" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="68" x2="130" y2="68" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="86" x2="132" y2="86" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="104" x2="128" y2="104" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="122" x2="130" y2="122" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="140" x2="125" y2="140" stroke="#EDE9E2" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- AI Brain/spark symbol -->
  <g transform="translate(130, 55)" class="shimmer-spark">
    <!-- Spark rays -->
    <line x1="0" y1="-14" x2="0" y2="-22" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="0" y2="22" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="-22" y2="0" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="22" y2="0" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Diagonal rays -->
    <line x1="-10" y1="-10" x2="-16" y2="-16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="10" y1="10" x2="16" y2="16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-10" y1="10" x2="-16" y2="16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="10" y1="-10" x2="16" y2="-16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#C8A96E" stroke-width="2"/>
  </g>
</svg>